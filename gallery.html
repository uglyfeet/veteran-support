<!DOCTYPE html>
<html lang="en">
<!-- this is the head section -->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Veteran support, social and support group for veterans in Uglyfeet, Ugly feet">
    <meta name="keywords" content="veteran, socialclub, support, Uglyfeet">
    <!-- title-->
    <title>Veteran Support | Gallery</title>
    <!-- favicon -->
    <link rel="apple-touch-icon" sizes="180x180" href="assets/favicon/apple-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon/favicon-16x16.png">
    <!-- link to CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<!-- this is the body section -->
<body>
    <!-- This is the header -->
    <header>
        <!-- this ensures that tapping the logo (veteran support) returns to the home page -->

        <a href="index.html">
            <img src="assets/images/mod-joint-forces-badge.svg" alt="Veteran Support logo" id="logo-image"> 
        </a>
        <h1>Gallery</h1>
        
        <!--this is the navigation toggles-->
        <input type="checkbox" id="nav-toggle" name="nav-toggle">
        <label for="nav-toggle" class="nav-toggle-label"> <i class="fa-solid fa-bars"></i></label>
        <nav>
            <ul id="menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="gallery.html" class="active">Gallery</a></li>
                <li><a href="signup.html">Sign Up</a></li>
                <li><a href="help.html">Help</a></li>
            </ul>
        </nav>
    </header>

    <!-- this is the main content -->
    <main>
        <section id="gallery">
            <h2 class="hidden-heading">Gallery</h2>
            <div id="photos">
                <img src="assets/images/patrol5.JPG" alt="Patorlling soldiers in Iraq">
                <img src="assets/images/patrol18.JPG" alt="Rifle drill in Iraq">
                <img src="assets/images/pheonix3.JPG" alt="Drone being deployed in Iraq">
                <img src="assets/images/plane8.JPG" alt="Hercules taking off from airport">
                <img src="assets/images/herc5.jpg" alt="Hercules deploying counter measures in Iraq">
                <img src="assets/images/patrol8.JPG" alt="boat patrol in Iraq">
                <img src="assets/images/three-different-forces.jpg" alt="Three different military forces wearing Iraq medals">
            </div>
        </section>
    </main>

    <!-- this is the footer -->
    <footer>
        <ul id="social-networks">
            <li><a href="https://www.facebook.com/" target="_blank" rel="noopener"
            aria-label="visit our facebook page (opens in a new tab)"><i class="fa-brands fa-facebook"></i>
                </a>
            </li>
            <li><a href="https://www.twitter.com/" target="_blank" rel="noopener"
            aria-label="visit our twitter page (opens in a new tab)"><i class="fa-brands fa-square-twitter"></i>
                </a>
            </li>
            <li><a href="https://www.youtube.com/" target="_blank" rel="noopener"
            aria-label="visit our youtube page (opens in a new tab)"><i class="fa-brands fa-square-youtube"></i>
                </a>
            </li>
            <li><a href="https://www.instagram.com/" target="_blank" rel="noopener"
            aria-label="visit our instagram page (opens in a new tab)"><i class="fa-brands fa-instagram"></i>
                </a>
            </li>
        </ul>
    </footer>
    
    <!-- Font Awesome icons -->
    <script
      src="https://kit.fontawesome.com/d5bcb50af0.js" crossorigin="anonymous">
    </script>     

</body>
</html>
