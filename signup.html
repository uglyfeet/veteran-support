<!DOCTYPE html>
<html lang="en">

<!-- this is the head section -->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Veteran support, social and support group for veterans in Uglyfeet, Ugly feet.">
    <meta name="keywords" content="veteran, socialclub, support, Uglyfeet,">
    <!-- title-->
    <title>Uglyfeet Town Veteran Support</title>
    <!-- favicon -->
    <link rel="apple-touch-icon" sizes="180x180" href="assets/favicon/apple-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon/favicon-16x16.png">
    <!-- link to CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<!-- this is the body section-->
<body>
    <!--header -->
    <header>
        <a href="index.html">
            <h1 id="logo">Sign Up</h1>
        </a>
        <input type="checkbox" id="nav-toggle" name="nav-toggle">
        <label for="nav-toggle" class="nav-toggle-label"> <i class="fa-solid fa-bars"></i></label>
        <nav>
            <ul id="menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="gallery.html">Gallery</a></li>
                <li><a href="signup.html" class="active">Sign Up</a></li>
                <li><a href="help.html">Help</a></li>
            </ul>
        </nav>
    </header>

    <!-- this is the main content -->
    <main>
        <section id="signup">
            <form id="signup-form" method="POST" action="https://formdump.codeinstitute.net">
                <h2><i class="fa-solid fa-handshake-angle"></i> Please Join Us!</h2>
                <label for="first-name">First Name</label>
                <input type="text" name="first_name" id="first-name" class="text-input" required>
                <br>
                <label for="last-name">Last Name</label>
                <input type="text" name="last_name" id="last-name" class="text-input" required>
                <br>
                <label for="email-address">Email Address</label>
                <input type="email" name="email_address" id="email-address" class="text-input" required>
                <br>
                <label for="Service-Number">Service Number</label>
                <input type="text" name="service_number" id="Service-Number" class="text-input" required>
                <br>
                <div class="radio-buttons">
                    <div>
                        <label for="Army">Army</label>
                        <input type="radio" name="Served-in" id="Army" value="Army" required checked>
                    </div>
                    <div>
                        <label for="Navy">Navy</label>
                        <input type="radio" name="Served-in" id="Navy" value="Navy" required>
                    </div>
                    <div>
                        <label for="Airforce">Airforce</label>
                        <input type="radio" name="Served-in" id="Airforce" value="Airforce" required>
                    </div>
                </div>
                <button type="submit" class="join-button">Submit</button>
            </form>
        </section>
    </main>

    <!-- this is the footer -->
    <footer>
        <ul id="social-networks">
            <li><a href="https://www.facebook.com/" target="_blank" rel="noopener"
            aria-label="visit our facebook page (opens in a new tab)"><i class="fa-brands fa-facebook"></i>
                </a>
            </li>
            <li><a href="https://www.twitter.com/" target="_blank" rel="noopener"
            aria-label="visit our twitter page (opens in a new tab)"><i class="fa-brands fa-square-twitter"></i>
                </a>
            </li>
            <li><a href="https://www.youtube.com/" target="_blank" rel="noopener"
            aria-label="visit our youtube page (opens in a new tab)"><i class="fa-brands fa-square-youtube"></i>
                </a>
            </li>
            <li><a href="https://www.instagram.com/" target="_blank" rel="noopener"
            aria-label="visit our instagram page (opens in a new tab)"><i class="fa-brands fa-instagram"></i>
                </a>
            </li>
        </ul>
    </footer>
    
    <!-- Font Awesome icons -->
    <script
      src="https://kit.fontawesome.com/d5bcb50af0.js" crossorigin="anonymous">
    </script>     

</body>
</html>
